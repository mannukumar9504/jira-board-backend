name: CI-CD Jira Board Backend

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build Nest app
        run: npm run build

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/jira-board-backend-app:latest .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/jira-board-backend-app:latest

      # Deploy to k8s
      - name: Set kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml

      - name: Deploy
        run: |
          kubectl --kubeconfig=kubeconfig.yaml apply -f k8s/